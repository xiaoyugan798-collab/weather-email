name: 每日天气邮件

on:
  schedule:
    # 每天早上 7:00 北京时间 (UTC+8 = 前一天 23:00 UTC)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 发送天气邮件
        env:
          QQ_MAIL_PASSWORD: ${{ secrets.QQ_MAIL_PASSWORD }}
        run: python send_weather.py
